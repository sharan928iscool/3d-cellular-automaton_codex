<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Conway's Game of Life</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at top, #101728 0%, #070b12 65%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .lil-gui {
        --background-color: rgba(12, 16, 26, 0.9);
        --title-background-color: rgba(27, 37, 62, 0.95);
        --widget-color: #8bb4ff;
        --text-color: #d9e6ff;
        --hover-color: #aec8ff;
        --focus-color: #d1dfff;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.174.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.174.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm';

      const app = document.getElementById('app');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x070b12);
      scene.fog = new THREE.Fog(0x070b12, 70, 210);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(36, 42, 36);

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      app.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.target.set(0, 0, 0);
      controls.minDistance = 12;
      controls.maxDistance = 230;
      controls.maxPolarAngle = Math.PI * 0.49;

      const ambientLight = new THREE.AmbientLight(0x9fb8ff, 0.4);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xa8c8ff, 1.25);
      directionalLight.position.set(22, 34, 20);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.set(2048, 2048);
      directionalLight.shadow.camera.left = -90;
      directionalLight.shadow.camera.right = 90;
      directionalLight.shadow.camera.top = 90;
      directionalLight.shadow.camera.bottom = -90;
      directionalLight.shadow.camera.near = 0.1;
      directionalLight.shadow.camera.far = 180;
      directionalLight.shadow.bias = -0.00008;
      scene.add(directionalLight);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(420, 420),
        new THREE.MeshStandardMaterial({
          color: 0x080d18,
          roughness: 0.9,
          metalness: 0.08,
        }),
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.001;
      floor.receiveShadow = true;
      scene.add(floor);

      const helperGrid = new THREE.GridHelper(180, 60, 0x1f3258, 0x13213b);
      helperGrid.material.opacity = 0.17;
      helperGrid.material.transparent = true;
      scene.add(helperGrid);

      const state = {
        gridSize: 50,
        speed: 12,
        running: false,
      };

      const sim = {
        size: state.gridSize,
        current: new Uint8Array(state.gridSize * state.gridSize),
        next: new Uint8Array(state.gridSize * state.gridSize),
        scale: new Float32Array(state.gridSize * state.gridSize),
        left: new Int16Array(state.gridSize),
        right: new Int16Array(state.gridSize),
        up: new Int16Array(state.gridSize),
        down: new Int16Array(state.gridSize),
      };

      const tmpMatrix = new THREE.Matrix4();
      const tmpPos = new THREE.Vector3();
      const tmpScale = new THREE.Vector3();
      const tmpQuat = new THREE.Quaternion();
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const pickPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const pickPoint = new THREE.Vector3();

      const cellSize = 1;
      const baseY = 0.5;
      let boardHalfExtent = (state.gridSize * cellSize) / 2;
      let cellsMesh;

      function buildWrapTables() {
        const n = sim.size;
        for (let i = 0; i < n; i += 1) {
          sim.left[i] = i === 0 ? n - 1 : i - 1;
          sim.right[i] = i === n - 1 ? 0 : i + 1;
          sim.up[i] = i === 0 ? n - 1 : i - 1;
          sim.down[i] = i === n - 1 ? 0 : i + 1;
        }
      }

      function indexAt(x, z) {
        return z * sim.size + x;
      }

      function randomizeGrid(probability = 0.28) {
        for (let i = 0; i < sim.current.length; i += 1) {
          sim.current[i] = Math.random() < probability ? 1 : 0;
          sim.scale[i] = sim.current[i] ? 1 : 0;
        }
        sim.next.fill(0);
        updateAllMatrices(true);
      }

      function clearGrid() {
        sim.current.fill(0);
        sim.next.fill(0);
        sim.scale.fill(0);
        updateAllMatrices(true);
      }

      function updateLogicStep() {
        const n = sim.size;
        const { current, next, left, right, up, down } = sim;

        for (let z = 0; z < n; z += 1) {
          const zUp = up[z];
          const zDown = down[z];
          const row = z * n;
          const rowUp = zUp * n;
          const rowDown = zDown * n;

          for (let x = 0; x < n; x += 1) {
            const xLeft = left[x];
            const xRight = right[x];
            const i = row + x;

            const neighbors =
              current[rowUp + xLeft] +
              current[rowUp + x] +
              current[rowUp + xRight] +
              current[row + xLeft] +
              current[row + xRight] +
              current[rowDown + xLeft] +
              current[rowDown + x] +
              current[rowDown + xRight];

            const alive = current[i] === 1;
            next[i] = alive ? (neighbors === 2 || neighbors === 3 ? 1 : 0) : neighbors === 3 ? 1 : 0;
          }
        }

        const swap = sim.current;
        sim.current = sim.next;
        sim.next = swap;
      }

      function gridIndexToWorld(x, z) {
        return {
          x: (x + 0.5) * cellSize - boardHalfExtent,
          z: (z + 0.5) * cellSize - boardHalfExtent,
        };
      }

      function buildInstancedMesh() {
        if (cellsMesh) {
          scene.remove(cellsMesh);
          cellsMesh.geometry.dispose();
          cellsMesh.material.dispose();
        }

        const maxCount = sim.size * sim.size;
        const geometry = new THREE.BoxGeometry(0.92, 0.92, 0.92);
        const material = new THREE.MeshStandardMaterial({
          color: 0x8ac7ff,
          emissive: 0x2f72ff,
          emissiveIntensity: 0.38,
          roughness: 0.3,
          metalness: 0.08,
        });

        cellsMesh = new THREE.InstancedMesh(geometry, material, maxCount);
        cellsMesh.castShadow = true;
        cellsMesh.receiveShadow = false;
        cellsMesh.frustumCulled = false;
        cellsMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        cellsMesh.count = maxCount;
        scene.add(cellsMesh);
      }

      function updateCellMatrix(index, x, z, scale) {
        const world = gridIndexToWorld(x, z);
        tmpPos.set(world.x, baseY, world.z);
        tmpScale.set(scale, scale, scale);
        tmpMatrix.compose(tmpPos, tmpQuat, tmpScale);
        cellsMesh.setMatrixAt(index, tmpMatrix);
      }

      function updateAllMatrices(force = false) {
        let changed = force;
        const n = sim.size;

        for (let z = 0; z < n; z += 1) {
          for (let x = 0; x < n; x += 1) {
            const idx = indexAt(x, z);
            const target = sim.current[idx] ? 1 : 0;
            const nextScale = force ? target : THREE.MathUtils.damp(sim.scale[idx], target, 18, deltaClock);

            if (force || Math.abs(nextScale - sim.scale[idx]) > 0.0006) {
              sim.scale[idx] = nextScale;
              updateCellMatrix(idx, x, z, nextScale);
              changed = true;
            }
          }
        }

        if (changed) {
          cellsMesh.instanceMatrix.needsUpdate = true;
        }
      }

      function initializeSimulation(size) {
        sim.size = size;
        sim.current = new Uint8Array(size * size);
        sim.next = new Uint8Array(size * size);
        sim.scale = new Float32Array(size * size);
        sim.left = new Int16Array(size);
        sim.right = new Int16Array(size);
        sim.up = new Int16Array(size);
        sim.down = new Int16Array(size);
        boardHalfExtent = (size * cellSize) / 2;

        buildWrapTables();
        buildInstancedMesh();
        randomizeGrid();
      }

      function worldToGrid(worldX, worldZ) {
        const n = sim.size;
        const x = Math.floor((worldX + boardHalfExtent) / cellSize);
        const z = Math.floor((worldZ + boardHalfExtent) / cellSize);
        if (x < 0 || x >= n || z < 0 || z >= n) return null;
        return { x, z };
      }

      function toggleCellFromPointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(pointer, camera);
        if (!raycaster.ray.intersectPlane(pickPlane, pickPoint)) return;

        const cell = worldToGrid(pickPoint.x, pickPoint.z);
        if (!cell) return;

        const idx = indexAt(cell.x, cell.z);
        sim.current[idx] = sim.current[idx] ? 0 : 1;
      }

      renderer.domElement.addEventListener('pointerdown', (event) => {
        if (event.button !== 0 || state.running) return;
        toggleCellFromPointer(event);
      });

      const guiState = {
        startPause: () => {
          state.running = !state.running;
          startPauseController.name(state.running ? 'Pause' : 'Start');
        },
        reset: () => {
          state.running = false;
          startPauseController.name('Start');
          clearGrid();
        },
        randomize: () => {
          randomizeGrid();
        },
      };

      const gui = new GUI({ title: "Conway's Life 3D" });
      const startPauseController = gui.add(guiState, 'startPause').name('Start');
      gui.add(guiState, 'reset').name('Reset');
      gui.add(guiState, 'randomize').name('Randomize');
      gui.add(state, 'speed', 1, 30, 1).name('Speed (steps/s)');
      gui
        .add(state, 'gridSize', 20, 140, 1)
        .name('Grid Size')
        .onFinishChange((value) => {
          state.running = false;
          startPauseController.name('Start');
          initializeSimulation(value);
        });

      let accumulator = 0;
      let deltaClock = 0;
      let lastTime = performance.now();

      function animate(now) {
        requestAnimationFrame(animate);
        deltaClock = Math.min((now - lastTime) / 1000, 0.1);
        lastTime = now;

        controls.update();

        if (state.running) {
          accumulator += deltaClock;
          const stepInterval = 1 / Math.max(state.speed, 1);
          while (accumulator >= stepInterval) {
            updateLogicStep();
            accumulator -= stepInterval;
          }
        }

        updateAllMatrices(false);
        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener('resize', onResize);

      initializeSimulation(state.gridSize);
      animate(performance.now());
    </script>
  </body>
</html>
